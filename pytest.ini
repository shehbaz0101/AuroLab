[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks end-to-end integration tests
    pybullet: marks tests that require pybullet installed
    live_api: marks tests that require real Groq API key

log_cli = true
log_cli_level = ERROR
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %H:%M:%S